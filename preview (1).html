<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Màn hình Nhiệt độ & Độ ẩm</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to bottom, #e0f7fa, #ffffff);
  }

  .display {
    background-color: #ffffff;
    border: 3px solid #90caf9;
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    width: 250px;
  }

  .temperature {
    font-size: 60px;
    font-weight: bold;
    color: #e53935;
    display: flex;
    justify-content: center;
    align-items: baseline;
  }

  .unit-temp {
    font-size: 28px;
    margin-left: 4px;
    vertical-align: top;
  }

  .humidity {
    font-size: 44px;
    color: #1e88e5;
    display: flex;
    justify-content: center;
    align-items: baseline;
    margin-top: 10px;
  }

  .unit-hum {
    font-size: 20px;
    margin-left: 3px;
    vertical-align: top;
  }

  .label {
    font-size: 16px;
    color: #555;
    margin-top: 12px;
  }

  .icon {
    font-size: 20px;
    margin-right: 6px;
  }
</style>
</head>
<body>

<div class="display">
  <div class="temperature">
    <span class="icon">🌡️</span> 22.8<span class="unit-temp">°C</span>
  </div>
  <div class="humidity">
    <span class="icon">💧</span> 46<span class="unit-hum">%</span>
  </div>
  <div class="label">Nhiệt độ & Độ ẩm</div>
</div>

</body>
</html>
