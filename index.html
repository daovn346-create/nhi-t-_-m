<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Display</title>
<style>
    body {
        background: #dfe6ee;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    .card {
        width: 420px;
        background: linear-gradient(145deg, #eef3f8, #d6dde5);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 10px 10px 20px rgba(0,0,0,0.2),
                    -10px -10px 20px rgba(255,255,255,0.7);
    }

    .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: #333;
    }

    .date {
        font-size: 28px;
        font-weight: bold;
    }

    .icons {
        font-size: 20px;
    }

    hr {
        margin: 15px 0;
        border: none;
        border-top: 1px solid #aaa;
    }

    .middle {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .temp {
        font-size: 50px;
    }

    .humidity {
        font-size: 50px;
    }

    .bottom {
        text-align: center;
        font-size: 70px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="card">
    <div class="top">
        <div>
            <div>DAY &nbsp;&nbsp;&nbsp; MONTH &nbsp;&nbsp;&nbsp; YEAR</div>
            <div class="date" id="date">--/--/----</div>
        </div>
        <div class="icons">📶 🔋</div>
    </div>

    <hr>

    <div class="middle">
        <div class="temp">🌡️ <span id="nhietDo">--</span></div>
        <div class="humidity">💧 <span id="doAm">--</span></div>
    </div>

    <hr>

    <div class="bottom" id="time">--:--</div>
</div>

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
<script>
    const temp = document.getElementById('nhietDo');
    const humi = document.getElementById('doAm');
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');

    let configTemp = null, configHumi = null;

    const eraWidget = new EraWidget();
    eraWidget.init({
      needRealtimeConfigs: true,
      maxRealtimeConfigsCount: 2,

      onConfiguration: (configuration) => {
        configTemp = configuration.realtime_configs[0];
        configHumi = configuration.realtime_configs[1];
      },

      onValues: (values) => {
        if (configTemp && values[configTemp.id]) {
            temp.innerHTML = values[configTemp.id].value + '°C';
        }
        if (configHumi && values[configHumi.id]) {
            humi.innerHTML = values[configHumi.id].value + '%';
        }
      }
    });

    // Clock realtime
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
const minutes = String(now.getMinutes()).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();

        timeEl.innerHTML = `${hours}:${minutes}`;
        dateEl.innerHTML = `${day}/${month}/${year}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
