<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>ERA Temperature & Humidity</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 40px;
    }

    .card {
      width: 200px;
      padding: 20px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    .value {
      font-size: 40px;
      font-weight: bold;
    }

    .bar {
      margin-top: 20px;
      height: 150px;
      width: 20px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      margin-left: auto;
      margin-right: auto;
    }

    .fill-temp {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: red;
      height: 0%;
    }

    .fill-humi {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: blue;
      height: 0%;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="card">
    <h3>🌡 Nhiệt độ</h3>
    <div class="value" id="nhietDo">-- °C</div>
    <div class="bar">
      <div class="fill-temp" id="tempBar"></div>
    </div>
  </div>

  <div class="card">
    <h3>💧 Độ ẩm</h3>
    <div class="value" id="doAm">-- %</div>
    <div class="bar">
      <div class="fill-humi" id="humiBar"></div>
    </div>
  </div>

</div>

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
<script>

const tempEl = document.getElementById('nhietDo');
const humiEl = document.getElementById('doAm');
const tempBar = document.getElementById('tempBar');
const humiBar = document.getElementById('humiBar');

let configTemp, configHumi;

const eraWidget = new EraWidget();
eraWidget.init({
  needRealtimeConfigs: true,

  onConfiguration: (config) => {
    configTemp = config.realtime_configs[0];
    configHumi = config.realtime_configs[1];
  },

  onValues: (values) => {
    const t = values[configTemp.id]?.value || 0;
    const h = values[configHumi.id]?.value || 0;

    tempEl.innerHTML = t + ' °C';
    humiEl.innerHTML = h + ' %';

    tempBar.style.height = (t * 2) + '%';
    humiBar.style.height = h + '%';
  }
});

</script>

</body>
</html>
